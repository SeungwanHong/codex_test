<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5a623;
            --bg-color: #f0f2f5;
            --ball-shadow: rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 2rem;
            font-size: 1.5rem;
        }

        .lotto-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            min-height: 60px;
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            box-shadow: 2px 4px 6px var(--ball-shadow);
            animation: bounce 0.5s ease-out;
        }

        @keyframes bounce {
            0% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-10px) scale(1.1); }
            100% { transform: translateY(0) scale(1); }
        }

        /* 로또 번호대별 색상 */
        .ball-1 { background: #fbc400; } /* 1-10 */
        .ball-11 { background: #69c8f2; } /* 11-20 */
        .ball-21 { background: #ff7272; } /* 21-30 */
        .ball-31 { background: #aaa; }    /* 31-40 */
        .ball-41 { background: #b0d840; } /* 41-45 */

        .btn-generate {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        .btn-generate:hover {
            background-color: #357abd;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }

        .btn-generate:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ 오늘의 추천 번호 ✨</h1>
        <div id="lotto-balls" class="lotto-container">
            <!-- 번호가 여기에 생성됩니다 -->
        </div>
        <button id="generate-btn" class="btn-generate">번호 생성하기</button>
    </div>

    <script>
        const lottoContainer = document.getElementById('lotto-balls');
        const generateBtn = document.getElementById('generate-btn');

        function getBallColorClass(num) {
            if (num <= 10) return 'ball-1';
            if (num <= 20) return 'ball-11';
            if (num <= 30) return 'ball-21';
            if (num <= 40) return 'ball-31';
            return 'ball-41';
        }

        function generateLottoNumbers() {
            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            return numbers.sort((a, b) => a - b);
        }

        function displayNumbers() {
            const numbers = generateLottoNumbers();
            lottoContainer.innerHTML = '';
            
            numbers.forEach((num, index) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getBallColorClass(num)}`;
                    ball.textContent = num;
                    lottoContainer.appendChild(ball);
                }, index * 100); // 0.1초 간격으로 순차적으로 등장
            });
        }

        generateBtn.addEventListener('click', displayNumbers);

        // 초기 실행
        displayNumbers();
    </script>
</body>
</html>
